<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Project Added Yet</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.classList.add(savedTheme + '-theme');
                    if (savedTheme === 'dark') {
                        document.getElementById('theme-toggle-checkbox').checked = true;
                    }
                });
            } else {
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.classList.add('light-theme');
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                const themeToggleCheckbox = document.getElementById('theme-toggle-checkbox');
                themeToggleCheckbox.addEventListener('change', function () {
                    if (this.checked) {
                        document.body.classList.remove('light-theme');
                        document.body.classList.add('dark-theme');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.body.classList.remove('dark-theme');
                        document.body.classList.add('light-theme');
                        localStorage.setItem('theme', 'light');
                    }
                });
            });
        })();
    </script>
</head>
<body>
    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress"></div>
    <!-- Header section with navigation -->
    <header>
        <nav>
            <!-- Profile image -->
            <img src="images/Portfolio.jpg" alt="Jordy Meijer">
            <!-- Your name -->
            <h1>Jordy Meijer</h1>
            <!-- Navigation links -->
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="portfolio.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <!-- Theme toggle buttons -->
            <div class="theme-toggle">
                <input type="checkbox" id="theme-toggle-checkbox">
                <label for="theme-toggle-checkbox" class="slider"></label>
            </div>
        </nav>
    </header>
    <!-- Main content section -->
    <main>
        <section id="no-project">
            <h2>No Project Added Yet</h2>
            <p>Sorry, this project has not been added yet. Please check back later.</p>
            <a href="portfolio.html" class="view-portfolio-btn">Back to Portfolio</a>
        </section>
    </main>
    <!-- Footer section -->
    <footer>
        <p>&copy; 2024 Jordy Meijer. All rights reserved.</p>
    </footer>
    <!-- Link to external JavaScript file -->
    <script src="js/script.js"></script>
</body>
</html>
